<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revenue Leak Audit</title>
<style>
body{font-family:system-ui;margin:0;background:#07111f;color:#f8fafc}main{max-width:900px;margin:auto;padding:56px 22px}.box{border:1px solid #26334d;border-radius:24px;padding:28px;background:#0f172a}input,textarea{width:100%;padding:14px;margin:8px 0 16px;border-radius:12px;border:1px solid #334155;background:#020617;color:white}button{padding:14px 22px;border:0;border-radius:999px;font-weight:800}
</style>
</head>
<body>
<main>
<section class="box">
<h1>Kostenloser Revenue Leak Audit</h1>
<p>Zeigen Sie uns Ihre Website, Google Profil oder Instagram Seite. Das System findet drei Stellen, an denen Anfragen oder Buchungen verloren gehen koennen.</p>
<form>
<label>Unternehmen</label><input name="business" placeholder="Name des Unternehmens">
<label>Website oder Profil</label><input name="profile" placeholder="https://...">
<label>Branche</label><input name="niche" placeholder="z.B. Kosmetikstudio, Friseur, Fahrschule">
<label>Aktuelles Problem</label><textarea name="problem" placeholder="Was funktioniert bei Anfragen oder Buchungen nicht gut?"></textarea>
<button type="button">Audit anfordern</button>
</form>
<p>Nach dem Audit kann ein Setup-Angebot angezeigt werden.</p>
</section>
</main>
</body>
</html>
