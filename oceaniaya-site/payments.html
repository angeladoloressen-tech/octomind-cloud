<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Oceaniaya — Payment Router</title><style>body{margin:0;background:#041018;color:#f4fbff;font-family:Inter,system-ui,Segoe UI,sans-serif}.wrap{width:min(980px,calc(100% - 34px));margin:auto;padding:64px 0}h1{font-size:clamp(44px,8vw,86px);line-height:.9;letter-spacing:-.08em;margin:18px 0}p{color:rgba(244,251,255,.72);font-size:19px;line-height:1.55}.card{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.075);border-radius:28px;padding:24px;margin:18px 0}.price{font-size:34px;color:#ffd166;font-weight:950}.btn{display:inline-flex;margin-top:10px;border:1px solid rgba(125,249,255,.44);background:linear-gradient(135deg,rgba(125,249,255,.18),rgba(91,140,255,.18));color:#f4fbff;text-decoration:none;border-radius:999px;padding:12px 15px;font-weight:900}form{display:grid;gap:12px}input,textarea,select{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:rgba(0,0,0,.25);color:#f4fbff;padding:13px;font:inherit}.hidden{display:none}</style></head><body><main class="wrap"><h1>Oceaniaya payment and invoice router.</h1><p>This launch-phase page captures audit, pilot and invoice intent. Actual payment is completed only after approved invoice or payment route.</p><div class="card"><form name="oceaniaya-payment-request" method="POST" data-netlify="true" netlify-honeypot="bot-field"><input type="hidden" name="form-name" value="oceaniaya-payment-request"><p class="hidden"><label>Do not fill: <input name="bot-field"></label></p><select name="offer"><option>AI Compliance & Automation Audit — CHF 7,500</option><option>Sovereign AI Knowledge Copilot Pilot — CHF 25,000</option><option>Validated AI Documentation Engine Pilot — CHF 35,000</option><option>Factory Service Agent Pilot — CHF 20,000</option><option>Luxury AI Concierge Sprint — CHF 10,000</option><option>Managed AI Operating Retainer — CHF 5,000–15,000/month</option></select><input name="company" placeholder="Company" required><input name="email" type="email" placeholder="Work email" required><input name="sector" placeholder="Sector"><textarea name="message" placeholder="Invoice, procurement or payment request details"></textarea><button class="btn" type="submit">Send payment request</button></form></div></main></body></html>
