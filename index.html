<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Cakes | The Slow-Dating Club</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A0A;
            color: #D4AF37;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            max-width: 500px;
            line-height: 1.6;
        }
        .btn {
            background-color: #6B0015;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 15px 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #D4AF37;
            color: #0A0A0A;
        }
    </style>
</head>
<body>
    <div style="font-size: 14px; letter-spacing: 5px; margin-bottom: 40px;">V E L V E T &nbsp; C A K E S</div>
    <h1>Kaydırmayı Bırak. Yaşamaya Başla.</h1>
    <p>Gay flört dünyasının et pazarı dönemi kapandı. Sonsuz kaydırmalara, sahte profillere ve tükenmişliğe veda et. Sadece tanışmaya değer olanlar için tasarlanmış 'yavaş flört' kulübüne hoş geldin.</p>
    <button class="btn">Davetiye Talep Et</button>
    <div style="font-size: 11px; color: #444; margin-top: 15px;">Şu an sırada 4.821 kişi bekliyor.</div>
</body>
</html>
